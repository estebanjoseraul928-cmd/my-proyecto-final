<!DOCTYPE html>
<html lang="es">
<head>
    <title>Enlaces Universitarios</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            /* Fondo base morado oscuro */
            background-color: #2b0b54;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 20px;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Capa 1: Nebulosas rosas y azules con movimiento lento */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 120, 200, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(100, 150, 255, 0.35) 0%, transparent 55%),
                radial-gradient(circle at 40% 80%, rgba(220, 100, 255, 0.3) 0%, transparent 60%),
                radial-gradient(circle at 85% 25%, rgba(80, 200, 255, 0.25) 0%, transparent 50%);
            background-size: 100% 100%;
            opacity: 0.8;
            z-index: -3;
            animation: nebulosaMovimiento 60s linear infinite;
        }

        /* Capa 2: Estrellas pequeñas blancas */
        .estrellas-blancas {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, white, transparent),
                radial-gradient(1px 1px at 60px 70px, white, transparent),
                radial-gradient(1.5px 1.5px at 50px 120px, white, transparent),
                radial-gradient(2px 2px at 90px 40px, white, transparent);
            background-size: 200px 200px;
            z-index: -2;
            animation: estrellasLejanas 30s linear infinite;
        }

        /* Capa 3: Estrellas azules con efecto 3D/brillo */
        .estrellas-azules {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(3px 3px at 150px 80px, #cce0ff, transparent),
                radial-gradient(2.5px 2.5px at 220px 150px, #99c2ff, transparent),
                radial-gradient(4px 4px at 300px 200px, #e6f0ff, transparent);
            background-size: 350px 350px;
            z-index: -1;
            animation: estrellasCercanas 20s linear infinite;
        }

        /* Animaciones */
        @keyframes nebulosaMovimiento {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-100px, -100px) scale(1.05); }
        }

        @keyframes estrellasLejanas {
            from { background-position: 0 0; }
            to { background-position: -200px 200px; }
        }

        @keyframes estrellasCercanas {
            from { background-position: 0 0; }
            to { background-position: -350px 350px; }
        }

        /* Estilos originales que conservamos tal cual */
        a {
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        a:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            border-radius: 10px;
        }

        img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Capas para el efecto de fondo -->
    <div class="estrellas-blancas"></div>
    <div class="estrellas-azules"></div>
